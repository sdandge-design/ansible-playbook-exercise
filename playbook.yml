---
- name: Configure Linux Environment (Debian + RedHat)
  hosts: localhost
  connection: local
  become: yes

  vars:
    user_home: "{{ ansible_env.HOME }}"
    user_name: "{{ ansible_env.USER }}"
    bin_dir: "{{ user_home }}/bin"
    venv_dir: "{{ user_home }}/ansible-venv"

  tasks:

    - name: Install python3-venv on Debian
      apt:
        name: python3-venv
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Install python3 on RedHat
      dnf:
        name:
          - python3
          - python3-pip
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Ensure bin directory exists
      file:
        path: "{{ bin_dir }}"
        state: directory
        mode: '0755'

    - name: Add bin to PATH
      lineinfile:
        path: "{{ user_home }}/.bashrc"
        line: 'export PATH="$HOME/bin:$PATH"'
        state: present

    - name: Create virtual environment
      command: python3 -m venv "{{ venv_dir }}"
      args:
        creates: "{{ venv_dir }}"

    - name: Upgrade pip in venv
      pip:
        name: pip
        state: latest
        virtualenv: "{{ venv_dir }}"

    - name: Install Ansible in venv
      pip:
        name: ansible
        state: present
        virtualenv: "{{ venv_dir }}"

    - name: Copy requirements.yml
      copy:
        src: requirements.yml
        dest: "{{ user_home }}/requirements.yml"
        mode: '0644'

    - name: Install collections
      command: >
        {{ venv_dir }}/bin/ansible-galaxy collection install
        -r {{ user_home }}/requirements.yml
      args:
        creates: "{{ user_home }}/.ansible/collections"

    - name: Add kubectl alias
      lineinfile:
        path: "{{ user_home }}/.bashrc"
        line: "alias k=kubectl"
        state: present

    - name: Verify venv exists
      stat:
        path: "{{ venv_dir }}"
      register: venv_stat

    - name: Fail if venv missing
      fail:
        msg: "Virtual environment not created"
      when: not venv_stat.stat.exists

    - name: Verify Ansible installation
      command: "{{ venv_dir }}/bin/ansible --version"
      register: ansible_check
      changed_when: false
      failed_when: ansible_check.rc != 0

    - name: Show Ansible version
      debug:
        var: ansible_check.stdout