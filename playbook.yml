---
- name: Configure Linux Environment (Debian + RedHat)
  hosts: all
  become: yes

  vars:
    user_home: "/home/{{ ansible_user }}"
    bin_dir: "{{ user_home }}/bin"
    venv_dir: "{{ user_home }}/ansible-venv"

  tasks:

    # -----------------------------
    # Install python venv package
    # -----------------------------
    - name: Install python3-venv on Debian
      apt:
        name: python3-venv
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Install python3 + venv tools on RedHat
      dnf:
        name:
          - python3
          - python3-virtualenv
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    # -----------------------------
    # User environment setup
    # -----------------------------
    - name: Ensure bin directory exists
      file:
        path: "{{ bin_dir }}"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Add bin to PATH
      lineinfile:
        path: "{{ user_home }}/.bashrc"
        line: 'export PATH="$HOME/bin:$PATH"'
        state: present

    # -----------------------------
    # Python Virtual Environment
    # -----------------------------
    - name: Ensure virtual environment exists
      command: python3 -m venv "{{ venv_dir }}"
      args:
        creates: "{{ venv_dir }}"

    # -----------------------------
    # Install pip + Ansible in venv
    # -----------------------------
    - name: Upgrade pip inside venv
      pip:
        name: pip
        state: latest
        virtualenv: "{{ venv_dir }}"

    - name: Install Ansible inside venv
      pip:
        name: ansible
        state: present
        virtualenv: "{{ venv_dir }}"

    # -----------------------------
    # Copy and install collections
    # -----------------------------
    - name: Copy requirements.yml
      copy:
        src: requirements.yml
        dest: "{{ user_home }}/requirements.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'

    - name: Install Ansible collections (idempotent)
      command: >
        {{ venv_dir }}/bin/ansible-galaxy collection install
        -r {{ user_home }}/requirements.yml
      args:
        creates: "{{ user_home }}/.ansible/collections"

    # -----------------------------
    # Shell configuration
    # -----------------------------
    - name: Add kubectl alias
      lineinfile:
        path: "{{ user_home }}/.bashrc"
        line: "alias k=kubectl"
        state: present

    # -----------------------------
    # Validation
    # -----------------------------
    - name: Check virtual environment exists
      stat:
        path: "{{ venv_dir }}"
      register: venv_stat

    - name: Fail if venv missing
      fail:
        msg: "Virtual environment was not created!"
      when: not venv_stat.stat.exists

    - name: Verify Ansible installation
      command: "{{ venv_dir }}/bin/ansible --version"
      register: ansible_check
      changed_when: false
      failed_when: ansible_check.rc != 0

    - name: Show Ansible version
      debug:
        var: ansible_check.stdout