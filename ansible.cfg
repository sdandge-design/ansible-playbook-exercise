[defaults]

# Inventory (you can override with -i)
inventory = ./inventory

# Disable host key checking (useful for dynamic VMs like Azure)
host_key_checking = False

# Output formatting (FIXES your previous error)
stdout_callback = ansible.builtin.default
result_format = yaml

# Reduce noise
deprecation_warnings = False
retry_files_enabled = False

# Improve performance
forks = 10
timeout = 30

# Python interpreter auto-detect
interpreter_python = auto

[ssh_connection]

# Faster SSH
pipelining = True

# Avoid SSH timeouts
ssh_args = -o ControlMaster=auto -o ControlPersist=60s